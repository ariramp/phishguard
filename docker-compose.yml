services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-phishguard}
      POSTGRES_USER: ${POSTGRES_USER:-phishguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_db_password}
    ports:
      - "5432:5434"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phishguard -d phishguard"]
      interval: 10s
      timeout: 5s
      retries: 10
    dns:
      - 1.1.1.1
      - 8.8.8.8

  ml:
    build:
      context: ./ml/serving
    environment:
      MODEL_URL_PATH: /app/ml_models/url_model.joblib
      MODEL_URL_METADATA_PATH: /app/ml_models/url_model.json
      MODEL_TEXT_PATH: /app/ml_models/text_model.joblib
      MODEL_TEXT_METADATA_PATH: /app/ml_models/text_model.json
      MODEL_FUSION_PATH: /app/ml_models/fusion_model.joblib
      MODEL_FUSION_METADATA_PATH: /app/ml_models/fusion_model.json
    ports:
      - "8000:8000"
    volumes:
      - ./ml_models:/app/ml_models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 10
    dns:
      - 1.1.1.1
      - 8.8.8.8

  backend:
    build:
      context: ./backend
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://${POSTGRES_USER:-phishguard}:${POSTGRES_PASSWORD:-change_me_db_password}@db:5432/${POSTGRES_DB:-phishguard}?sslmode=disable"
      ML_BASE_URL: "http://ml:8000"
      ML_TIMEOUT: "2s"
      POLL_INTERVAL: "15m"
      GIN_MODE: "release"
      ACCOUNT_CREDENTIALS_KEY: "${ACCOUNT_CREDENTIALS_KEY:-change_me_account_crypto_key_32_chars_min}"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      ml:
        condition: service_healthy
    dns:
      - 1.1.1.1
      - 8.8.8.8
